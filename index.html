<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Login</title>
    <!--========== CSS File ==========-->
    <link rel="stylesheet" href="style.css">

    <!--========== Favicon ==========-->
    <link rel="shortcut icon" href="/assets/Images/favicon.ico" type="image/x-icon">

    <!--========== Remixicon ==========-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.css" integrity="sha512-OQDNdI5rpnZ0BRhhJc+btbbtnxaj+LdQFeh0V9/igiEPDiWE2fG+ZsXl0JEH+bjXKPJ3zcXqNyP4/F/NegVdZg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!--==========Spotify font==========-->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

</head>
<body>
    <!--========== Header ==========-->
    <header class="spotify-header">
        <!--===== Nav =====-->
        <nav class="spotify-nav">
            <i class="ri-spotify-fill logo"></i>
            <span class="head-txt">Spotify</span>
        </nav>
    </header>

    <!--========== Main Content ==========-->
    <main class="main-content">
        <!--===== Login Container =====-->
        <div class="login-container">
            <div class="login-head">
                <h1>Log in to Spotify</h1>
            </div>

            <div class="login-options">
                <button type="button" class="social-btn google" data-provider="Google" aria-label="Continue with Google">
                    <img src="/assets/Images/google.webp" alt="">
                    <span>Continue with Google</span>
                </button>

                <button type="button" class="social-btn facebook" data-provider="Facebook" aria-label="Continue with Facebook">
                    <img src="/assets/Images/facebook.svg" alt="">
                    <span>Continue with Facebook</span>
                </button>

                <button type="button" class="social-btn apple" data-provider="Apple" aria-label="Continue with Apple">
                    <img src="/assets/Images/apple.png" alt="">
                    <span>Continue with Apple</span>
                </button>

                <button type="button" class="social-btn mobile" data-provider="Phone" aria-label="Continue with phone number">
                    <span>Continue with phone number</span>
                </button>
            </div>

<form id="login-form" class="login-content" novalidate>
    <div class="email-input-box">
      <label for="email" class="email-label">Email or username</label>
      <input type="text" id="email" class="email-input" placeholder="Email or username" autocomplete="username" inputmode="email" required>
    </div>
  
    <div class="password-input-box">
      <label for="password" class="password-label">Password</label>
      <div class="pass-div">
        <input type="password" id="password" class="password-input" placeholder="Password" required>
        <i class="ri-eye-off-line pass-toggle"></i>
      </div>
    </div>
  
    <div class="remember">
      <input type="checkbox" class="rem-check" checked>
      <span class="rem-txt">Remember me</span>
    </div>
  
    <div class="login-button">
      <button type="submit" class="login-btn">Log In</button>
    </div>
  
    <div class="forgot">
      <a href="#" id="forgot-link" class="forgot-txt">Forgot your password?</a>
    </div>
  </form>

  <!-- Reset password modal -->
  <div id="reset-modal" class="modal" hidden aria-hidden="true">
    <div class="modal-backdrop" data-close="true"></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="reset-modal-title">
      <button type="button" class="modal-close" aria-label="Close" data-close="true">&times;</button>
      <h2 id="reset-modal-title" class="modal-title">Reset your password</h2>
      <p class="modal-subtitle">Enter your email address or username, and we’ll send you a magic link to get back into your account.</p>

      <div class="modal-field">
        <label for="reset-email" class="email-label">Email address or username</label>
        <input type="text" id="reset-email" class="email-input" placeholder="Email address or username" autocomplete="username" inputmode="email">
      </div>

      <div class="modal-actions">
        <button type="button" id="reset-send" class="login-btn">Send magic link</button>
        <button type="button" id="reset-cancel" class="modal-cancel" data-close="true">Cancel</button>
      </div>
    </div>
  </div>
  
  <!-- Spotify-style popup message -->
  <div id="spotify-popup" style="display:none;position:fixed;top:32px;left:50%;transform:translateX(-50%);background:#282828;color:#fff;padding:16px 32px;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.3);font-family:'Montserrat',sans-serif;font-size:1rem;z-index:9999;min-width:260px;text-align:center;">
    <span id="popup-message"></span>
    <button id="popup-close" style="background:none;border:none;color:#1db954;font-weight:bold;font-size:1.1rem;margin-left:16px;cursor:pointer;">Close</button>
  </div>
  <script>
    const storedUser = {
      email: "user@gmail.com",
      password: "123456"
    };

    // Show/hide password functionality
    const passwordInput = document.getElementById("password");
    const passToggle = document.querySelector(".pass-toggle");
    passToggle.addEventListener("click", function () {
      if (passwordInput.type === "password") {
        passwordInput.type = "text";
        passToggle.classList.remove("ri-eye-off-line");
        passToggle.classList.add("ri-eye-line");
      } else {
        passwordInput.type = "password";
        passToggle.classList.remove("ri-eye-line");
        passToggle.classList.add("ri-eye-off-line");
      }
    });

    // Spotify-style popup logic
    function showSpotifyPopup(message) {
      const popup = document.getElementById('spotify-popup');
      const popupMsg = document.getElementById('popup-message');
      popupMsg.textContent = message;
      popup.style.display = 'block';
      // Auto-hide after 3 seconds
      const timeout = setTimeout(() => { popup.style.display = 'none'; }, 3000);
      // Close button
      document.getElementById('popup-close').onclick = function() {
        popup.style.display = 'none';
        clearTimeout(timeout);
      };
    }

    document.getElementById("login-form").addEventListener("submit", function (e) {
      e.preventDefault();
      const inputEmail = document.getElementById("email").value;
      const inputPassword = document.getElementById("password").value;
      if (inputEmail === storedUser.email && inputPassword === storedUser.password) {
        window.location.href = "main.html"; // redirect to main page
      } else {
        showSpotifyPopup("Spotify says: Invalid email or password.");
      }
    });

    // Continue with buttons
    document.querySelectorAll(".social-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        const provider = btn.dataset.provider || "provider";
        showSpotifyPopup(`Spotify says: Continuing with ${provider}...`);
        setTimeout(() => {
          window.location.href = "main.html";
        }, 700);
      });
    });

    // Forgot password modal
    const forgotLink = document.getElementById("forgot-link");
    const resetModal = document.getElementById("reset-modal");
    const resetSend = document.getElementById("reset-send");
    const resetCancel = document.getElementById("reset-cancel");
    const resetEmail = document.getElementById("reset-email");
    let lastFocusEl = null;

    function openResetModal() {
      lastFocusEl = document.activeElement;
      resetModal.hidden = false;
      resetModal.setAttribute("aria-hidden", "false");
      resetEmail.value = document.getElementById("email").value || "";
      resetEmail.focus();
    }
    function closeResetModal() {
      resetModal.hidden = true;
      resetModal.setAttribute("aria-hidden", "true");
      if (lastFocusEl && typeof lastFocusEl.focus === "function") lastFocusEl.focus();
    }

    forgotLink.addEventListener("click", (e) => {
      e.preventDefault();
      openResetModal();
    });
    resetCancel.addEventListener("click", closeResetModal);

    // Close modal by clicking backdrop / close icons
    resetModal.addEventListener("click", (e) => {
      const el = e.target;
      if (el && el.dataset && el.dataset.close === "true") closeResetModal();
    });

    // Close on ESC
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && !resetModal.hidden) closeResetModal();
    });

    resetSend.addEventListener("click", () => {
      const value = resetEmail.value.trim();
      if (!value) {
        showSpotifyPopup("Spotify says: Please enter your email address or username.");
        resetEmail.focus();
        return;
      }
      showSpotifyPopup("Spotify says: If this account exists, we sent a magic link.");
      setTimeout(closeResetModal, 900);
    });
  </script>
  
        </div>
    </main>

    <!--========== Footer ==========-->
    <footer class="footer">
        <span class="footer-txt">This site is protected by reCAPTCHA and the Google <a href="#">Privacy Policy</a> and <a href="#">Terms of Service</a> apply.</span>
    </footer>      
</body>
</html>
